name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend:
    name: Backend — v${{ github.run_number }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: njohbillie/sepa-trader-backend:v${{ github.run_number }}

  build-frontend:
    name: Frontend — v${{ github.run_number }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: njohbillie/sepa-trader-frontend:v${{ github.run_number }}

  deploy:
    name: Deploy to NAS — v${{ github.run_number }}
    runs-on: self-hosted
    needs: [build-backend, build-frontend]
    steps:
      - name: Update IMAGE_TAG in .env
        working-directory: /volume2/docker/sepa-trader
        run: sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=v${{ github.run_number }}/" .env

      - name: Pull new images
        working-directory: /volume2/docker/sepa-trader
        run: docker compose pull

      - name: Restart stack
        working-directory: /volume2/docker/sepa-trader
        run: |
          docker compose down
          docker rmi njohbillie/sepa-trader-backend:v${{ github.run_number - 1 }} || true
          docker rmi njohbillie/sepa-trader-frontend:v${{ github.run_number - 1 }} || true
          docker compose up -d
